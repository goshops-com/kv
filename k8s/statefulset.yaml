apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tieredkv
  labels:
    app: tieredkv
spec:
  serviceName: tieredkv
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: tieredkv
  template:
    metadata:
      labels:
        app: tieredkv
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: regcred
      containers:
        - name: tieredkv
          image: goshops/kv:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: tieredkv-config
            - secretRef:
                name: tieredkv-azure-credentials
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TOTAL_SHARDS
              value: "3"
          resources:
            requests:
              memory: "2Gi"
              cpu: "100m"
            limits:
              memory: "8Gi"
              cpu: "3000m"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
