apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: tieredkv

resources:
  - configmap.yaml
  - secret.yaml
  - service.yaml
  - statefulset.yaml
  - pdb.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: tieredkv
  app.kubernetes.io/version: "0.1.0"

# Namespace (uncomment and set your namespace)
# namespace: tieredkv

# Image customization
images:
  - name: tieredkv
    newName: your-registry/tieredkv
    newTag: latest

# Config customization via patches
# Example: Change number of shards
# patches:
#   - patch: |-
#       - op: replace
#         path: /spec/replicas
#         value: 5
#     target:
#       kind: StatefulSet
#       name: tieredkv
