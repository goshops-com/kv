# Horizontal Pod Autoscaler for replicas within shards
# Note: This scales replicas, not shards. For sharding, manually update StatefulSet replicas.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tieredkv-hpa
  labels:
    app: tieredkv
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: tieredkv
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
